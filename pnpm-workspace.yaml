packages:
  - packages/*
  - apps/*
  - packages/*/demo

catalog:
  '@better-auth/expo': 1.6.20
  '@corentinth/chisels': 2.1.0
  '@types/node': ^26.0.0
  '@vitest/coverage-v8': ^4.0.3
  better-auth: 1.6.20
  p-limit: ^7.3.0
  sharp: ^0.34.5
  tsdown: ^0.13.4
  tsx: ^4.20.6
  typescript: ^6.0.3
  vitest: 4.1.9
  unocss: 66.6.0
  '@unocss/reset': 66.6.0
  unocss-preset-animations: 1.3.0
  astro: 7.0.3
  '@iconify-json/tabler': ^1.2.26
  ofetch: 1.4.1
  valibot: ^1.3.1
  figue: ^3.3.0
  '@paralleldrive/cuid2': ^3.3.0

nodeLinker: hoisted
verifyDepsBeforeRun: false # pnpm deploy in prod mode strips dev deps, so we don't want to verify them before run

allowBuilds:
  canvas: true
  core-js: true
  sharp: true
  esbuild: true
  tesseract.js: false
  cpu-features: false
  dtrace-provider: false
  protobufjs: false
  ssh2: false
  unrs-resolver: false
  workerd: false
